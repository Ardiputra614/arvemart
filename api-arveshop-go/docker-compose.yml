version: "3.9"

services:

  app:
    build: .
    container_name: api-arveshop-go
    restart: always
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: mysql:8
    container_name: mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: arveshop123
      MYSQL_DATABASE: arveshop
      MYSQL_USER: arveshop
      MYSQL_PASSWORD: arveshop123
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    depends_on:
      - db

volumes:
  mysql_data:
